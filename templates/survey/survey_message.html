{% extends "base.html" %}
{% load i18n %}
{% block title %}{{ message_title|default:"안내" }} – LifeAI US{% endblock %}

{% block content %}
<div class="container">
  <div class="card" style="max-width: 560px; margin: 0 auto; text-align: center;">
    <h1>{{ message_title|default:"안내" }}</h1>
    <p class="text-muted" style="margin: 1rem 0; white-space: pre-wrap;">{{ message_body|default:"" }}</p>
    <a href="{% url 'settlement_quote' %}" class="btn btn-primary">{% trans "내 견적으로" %}</a>
    <a href="{% url 'app_customer_dashboard' %}" class="btn btn-outline" style="margin-left: 0.5rem;">{% trans "대시보드" %}</a>
  </div>
</div>
{% endblock %}
