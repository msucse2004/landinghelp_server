{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "로그인" %} – LifeAI US{% endblock %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 0 auto;">
  <h2 data-i18n-key="로그인">{% trans "로그인" %}</h2>
  {% if form.errors %}
  <p class="form-errors" data-i18n-key="아이디와 비밀번호를 확인해주세요.">{% trans "아이디와 비밀번호를 확인해주세요." %}</p>
  {% endif %}
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_username" data-i18n-key="아이디">{% trans "아이디" %}</label>
      <input type="text" name="username" id="id_username" required autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label for="id_password" data-i18n-key="비밀번호">{% trans "비밀번호" %}</label>
      <input type="password" name="password" id="id_password" required autocomplete="current-password">
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-primary btn-block" data-i18n-key="로그인">{% trans "로그인" %}</button>
  </form>
  <p style="margin-top: 1rem; text-align: center; font-size: 0.95rem;">
    <a href="{% url 'find_username' %}" data-i18n-key="아이디 찾기">{% trans "아이디 찾기" %}</a>
    <span style="margin: 0 0.5rem;">|</span>
    <a href="{% url 'password_reset' %}" data-i18n-key="비밀번호 찾기">{% trans "비밀번호 찾기" %}</a>
  </p>
</div>
{% endblock %}
