services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-landinghelp}
      POSTGRES_USER: ${DB_USER:-landinghelp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-landinghelp}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-landinghelp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DB_NAME: ${DB_NAME:-landinghelp}
      # SMTP: 환경변수로만 전달(키/비밀 노출 금지). 미설정 시 콘솔 백엔드로 리마인더 등 비활성
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@landinghelp.local}
      DB_USER: ${DB_USER:-landinghelp}
      DB_PASSWORD: ${DB_PASSWORD:-landinghelp}
      DB_HOST: db
      DB_PORT: "5432"
      # 번역 파이프라인 (값은 호스트 env에서 전달, 하드코딩 금지)
      DEEPL_AUTH_KEY: ${DEEPL_AUTH_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
